server {
    listen 8888;
    server_name _;

    # Serve processed videos for Instagram to fetch
    location /processed/ {
        alias /opt/reel-bot/data/processed/;
        types {
            video/mp4 mp4;
        }
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=3600";
    }

    # Health check endpoint
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    access_log /var/log/nginx/reel-bot-access.log;
    error_log /var/log/nginx/reel-bot-error.log;
}
